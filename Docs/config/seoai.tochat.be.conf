<VirtualHost *:80>
	ServerAdmin     webmaster@localhost
	ServerName      seoai.tochat.be
    ServerAlias     www.seoai.tochat.be

	DocumentRoot /var/www/seoai.tochat.be/public

	<Directory />
	   Options Indexes FollowSymLinks MultiViews
	   AllowOverride all
	   Order allow,deny
	   allow from all
	</Directory>


	<Directory "/var/www/seoai.tochat.be/public">
	   Options Indexes FollowSymLinks MultiViews
	   AllowOverride all
	   Order allow,deny
	   allow from all
	</Directory>

	   ScriptAlias /cgi-bin/ /usr/lib/cgi-bin/
	<Directory "/usr/lib/cgi-bin">
	   AllowOverride None
	   Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
	   Order allow,deny
	   Allow from all
	</Directory>

       # Possible values include: debug, info, notice, warn, error, crit,
       # alert, emerg.
       LogLevel debug

       ErrorLog ${APACHE_LOG_DIR}/seoai.tochat.be-error.log
       CustomLog ${APACHE_LOG_DIR}/seoai.tochat.be-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
   <VirtualHost *:443>
        ServerAdmin     webmaster@localhost
        ServerName      seoai.tochat.be
        ServerAlias     www.seoai.tochat.be

        DocumentRoot /var/www/seoai.tochat.be/public

        <Directory />
           Options Indexes FollowSymLinks MultiViews
           AllowOverride all
           Order allow,deny
           allow from all
        </Directory>

        <Directory "/var/www/seoai.tochat.be/public">
           Options Indexes FollowSymLinks MultiViews
           AllowOverride all
           Order allow,deny
           allow from all
        </Directory>

           SSLEngine on

        <FilesMatch "\.(cgi|shtml|phtml|php)$">
           SSLOptions +StdEnvVars
        </FilesMatch>

        <Directory /usr/lib/cgi-bin>
           SSLOptions +StdEnvVars
        </Directory>

        LogLevel debug
        ErrorLog ${APACHE_LOG_DIR}/ssl-seoai.tochat.be-error.log
        CustomLog ${APACHE_LOG_DIR}/ssl-seoai.tochat.be-access.log combined

        SSLCertificateFile /etc/letsencrypt/live/seoai.tochat.be/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/seoai.tochat.be/privkey.pem

    </VirtualHost>

</IfModule>

